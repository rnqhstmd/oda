spring:
  application:
    name: oda
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oda}
    username: ${DB_USERNAME:oda}
    password: ${DB_PASSWORD:oda}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=6h
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

oda:
  jwt:
    secret: ${JWT_SECRET:defaultDevSecretKeyThatIsAtLeast256BitsLongForHmacSha256Algorithm}
    access-expiration: 1800000
    refresh-expiration: 1209600000
  oauth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  encryption:
    aes-key: ${AES_ENCRYPTION_KEY:dGVzdEtleUZvckRldmVsb3BtZW50MTIzNDU2Nzg5MDE=}
  api:
    public-data-key: ${PUBLIC_DATA_API_KEY:}
    saramin-key: ${SARAMIN_API_KEY:}
    wanted-key: ${WANTED_API_KEY:}

server:
  port: 8080

logging:
  level:
    com.oda: DEBUG
    org.springframework.security: INFO
